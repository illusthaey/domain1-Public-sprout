<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PDF 페이지 삭제 (브라우저에서만 처리)</title>

  <!-- ✅ PDF 조작 라이브러리 (pdf-lib) -->
  <!-- 인터넷이 되는 환경에서 사용: CDN 로드 -->
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

  <style>
    :root {
      --fg: #111;
      --muted: #666;
      --bd: #e5e7eb;
      --bg: #fff;
      --card: #fafafa;
      --accent: #111;
      --danger: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      color: var(--fg);
      background: var(--bg);
      line-height: 1.5;
    }
    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 64px;
    }
    h1 {
      font-size: 1.8rem;
      margin: 16px 0 8px;
      text-align: center;
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      margin: 0 0 18px;
      font-size: 0.98rem;
    }
    .section {
      border: 1px solid var(--bd);
      border-radius: 14px;
      padding: 18px;
      background: #fff;
      margin: 14px 0;
    }
    .card {
      border: 1px solid var(--bd);
      border-radius: 12px;
      background: var(--card);
      padding: 14px;
      margin-top: 12px;
    }
    label { font-weight: 700; display: block; margin-bottom: 8px; }
    input[type="file"],
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d9d9e3;
      border-radius: 12px;
      background: #f9fafb;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #b4b4d0;
      box-shadow: 0 0 0 2px rgba(180, 180, 208, 0.25);
      background: #fff;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .row > * { flex: 1; min-width: 240px; }
    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #222;
      background: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:hover { background: #f3f4f6; }
    .btn.primary {
      background: #111;
      color: #fff;
    }
    .btn.primary:hover { background: #000; }
    .btn.ghost {
      background: #f9fafb;
      border-color: #d4d4d8;
    }
    .btn.ghost:hover { background: #eef2ff; }
    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .hint { color: var(--muted); font-size: 0.95rem; margin-top: 8px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--bd);
      background: #fff;
      white-space: pre-wrap;
    }
    .status.error {
      border-color: rgba(185, 28, 28, 0.35);
      background: rgba(185, 28, 28, 0.06);
      color: var(--danger);
    }
    .pill {
      display: inline-block;
      padding: 3px 10px;
      border: 1px solid var(--bd);
      border-radius: 999px;
      background: #fff;
      font-size: 0.92rem;
      color: #333;
      margin-right: 6px;
      margin-top: 6px;
    }
    .footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>PDF 페이지 삭제</h1>
    <p class="subtitle">파일은 서버로 전송되지 않고, 브라우저 안에서만 처리됩니다.</p>

    <div class="section">
      <div class="row">
        <div>
          <label for="pdfFile">1) PDF 업로드</label>
          <input id="pdfFile" type="file" accept="application/pdf" />
          <div class="hint">선택한 PDF에서 삭제할 페이지 번호를 입력하세요.</div>
        </div>
        <div>
          <label for="pagesToDelete">2) 삭제할 페이지 번호</label>
          <input id="pagesToDelete" type="text" placeholder="예: 2, 4-6, 9" disabled />
          <div class="hint">
            입력 형식: <span class="mono">쉼표</span> 또는 <span class="mono">공백</span> 구분,
            <span class="mono">-</span> 또는 <span class="mono">~</span>로 범위 지정 가능
          </div>
        </div>
      </div>

      <div class="card">
        <div class="row" style="align-items:flex-start;">
          <div style="min-width:260px;">
            <button id="btnMake" class="btn primary" disabled>3) 삭제 적용 & 새 PDF 만들기</button>
            <button id="btnReset" class="btn ghost" disabled>초기화</button>
          </div>
          <div>
            <div id="meta"></div>
            <div id="chips"></div>
          </div>
        </div>

        <div id="status" class="status" style="display:none;"></div>

        <div style="margin-top:12px;">
          <a id="downloadLink" class="btn" style="display:none;" download>결과 PDF 다운로드</a>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 style="margin:0 0 10px; font-size:1.1rem;">작동 방식 메모</h2>
      <ul style="margin:0; padding-left:18px; color:#333;">
        <li>페이지 번호는 PDF 뷰어 기준처럼 <b>1부터 시작</b>합니다.</li>
        <li>예: <span class="mono">1, 3-5</span> → 1페이지와 3~5페이지를 삭제합니다.</li>
        <li>암호로 보호된(암호화된) PDF는 브라우저에서 처리가 실패할 수 있습니다.</li>
      </ul>
    </div>

    <div class="footer">© 단일 HTML · pdf-lib 사용</div>
  </div>

  <script>
    const $ = (sel) => document.querySelector(sel);

    const pdfFile = $("#pdfFile");
    const pagesToDelete = $("#pagesToDelete");
    const btnMake = $("#btnMake");
    const btnReset = $("#btnReset");
    const meta = $("#meta");
    const chips = $("#chips");
    const statusEl = $("#status");
    const downloadLink = $("#downloadLink");

    let originalBytes = null;
    let originalName = null;
    let totalPages = 0;
    let lastObjectUrl = null;

    function setStatus(msg, type = "info") {
      statusEl.style.display = "block";
      statusEl.textContent = msg;
      statusEl.classList.toggle("error", type === "error");
    }

    function clearStatus() {
      statusEl.style.display = "none";
      statusEl.textContent = "";
      statusEl.classList.remove("error");
    }

    function clearDownload() {
      downloadLink.style.display = "none";
      downloadLink.removeAttribute("href");
      downloadLink.removeAttribute("download");
      if (lastObjectUrl) {
        URL.revokeObjectURL(lastObjectUrl);
        lastObjectUrl = null;
      }
    }

    function updateMeta() {
      meta.innerHTML = "";
      chips.innerHTML = "";

      if (!originalBytes) return;

      const fileChip = document.createElement("span");
      fileChip.className = "pill";
      fileChip.textContent = `파일: ${originalName}`;

      const pageChip = document.createElement("span");
      pageChip.className = "pill";
      pageChip.textContent = `총 페이지: ${totalPages}`;

      meta.appendChild(fileChip);
      meta.appendChild(pageChip);
    }

    // 입력 텍스트를 페이지 번호 Set(1-based)로 변환
    // 지원: "1,2,5-7", "1 2 3-4", "1~3" 등
    function parsePages(text, maxPage) {
      const cleaned = (text || "")
        .trim()
        .replace(/[，;]/g, ",")
        .replace(/[~〜–—]/g, "-"); // 사용자가 ~, en dash 등을 써도 처리

      if (!cleaned) {
        return { set: new Set(), invalidTokens: [], outOfRange: [] };
      }

      const tokens = cleaned.split(/[\s,]+/).filter(Boolean);

      const set = new Set();
      const invalidTokens = [];
      const outOfRange = [];

      for (const token of tokens) {
        // 단일 숫자
        if (/^\d+$/.test(token)) {
          const n = Number(token);
          if (!Number.isFinite(n)) { invalidTokens.push(token); continue; }
          if (n < 1 || n > maxPage) outOfRange.push(n);
          else set.add(n);
          continue;
        }

        // 범위 a-b
        if (/^\d+\-\d+$/.test(token)) {
          const [aStr, bStr] = token.split("-");
          let a = Number(aStr);
          let b = Number(bStr);
          if (!Number.isFinite(a) || !Number.isFinite(b)) { invalidTokens.push(token); continue; }

          // 사용자가 7-3처럼 써도 정상 처리(뒤집기)
          if (a > b) [a, b] = [b, a];

          // 너무 큰 범위 방지(실수로 1-999999 같은 입력)
          if (b - a > 20000) { invalidTokens.push(token); continue; }

          for (let n = a; n <= b; n++) {
            if (n < 1 || n > maxPage) outOfRange.push(n);
            else set.add(n);
          }
          continue;
        }

        invalidTokens.push(token);
      }

      // outOfRange 중복 제거
      const uniqOut = Array.from(new Set(outOfRange)).sort((x,y)=>x-y);

      return { set, invalidTokens, outOfRange: uniqOut };
    }

    function safeOutputName(inputName, suffix) {
      const base = (inputName || "document.pdf").replace(/\.pdf$/i, "");
      // 파일명에 위험 문자 제거
      const safe = base.replace(/[\\\/:*?"<>|]+/g, "_").trim() || "document";
      return `${safe}${suffix}.pdf`;
    }

    async function loadPdf(file) {
      clearStatus();
      clearDownload();

      originalName = file.name || "document.pdf";
      originalBytes = await file.arrayBuffer();

      // 페이지 수 확인
      const pdfDoc = await PDFLib.PDFDocument.load(originalBytes);
      totalPages = pdfDoc.getPageCount();

      updateMeta();

      pagesToDelete.disabled = false;
      btnMake.disabled = false;
      btnReset.disabled = false;

      pagesToDelete.placeholder = totalPages
        ? `예: 2, 4-6, ${Math.min(9, totalPages)}`
        : "예: 2, 4-6, 9";
    }

    function resetAll() {
      originalBytes = null;
      originalName = null;
      totalPages = 0;

      pdfFile.value = "";
      pagesToDelete.value = "";
      pagesToDelete.disabled = true;

      btnMake.disabled = true;
      btnReset.disabled = true;

      meta.innerHTML = "";
      chips.innerHTML = "";
      clearStatus();
      clearDownload();
    }

    async function makeDeletedPdf() {
      clearStatus();
      clearDownload();

      if (!originalBytes) {
        setStatus("PDF 파일을 먼저 선택하세요.", "error");
        return;
      }

      let pdfDoc;
      try {
        pdfDoc = await PDFLib.PDFDocument.load(originalBytes);
      } catch (e) {
        setStatus(
          "PDF를 읽는 데 실패했습니다.\n- 암호로 보호된 PDF일 수 있습니다.\n- 파일이 손상되었을 수도 있습니다.\n\n에러: " + (e?.message || String(e)),
          "error"
        );
        return;
      }

      const total = pdfDoc.getPageCount();
      const input = pagesToDelete.value;

      const parsed = parsePages(input, total);
      const delSet = parsed.set;

      // 피드백 칩
      chips.innerHTML = "";
      const mkChip = (txt) => {
        const s = document.createElement("span");
        s.className = "pill";
        s.textContent = txt;
        return s;
      };

      chips.appendChild(mkChip(`삭제 대상: ${delSet.size}개`));
      if (parsed.invalidTokens.length) chips.appendChild(mkChip(`형식 오류: ${parsed.invalidTokens.length}개`));
      if (parsed.outOfRange.length) chips.appendChild(mkChip(`범위 밖: ${parsed.outOfRange.length}개`));

      if (parsed.invalidTokens.length) {
        setStatus(
          "입력 형식이 올바르지 않은 항목이 있습니다:\n- " + parsed.invalidTokens.join(", ") +
          "\n\n예시: 2, 4-6, 9",
          "error"
        );
        return;
      }

      if (parsed.outOfRange.length) {
        setStatus(
          `페이지 범위를 벗어난 번호가 있습니다 (1 ~ ${total}):\n- ` + parsed.outOfRange.join(", "),
          "error"
        );
        return;
      }

      // 아무 것도 삭제하지 않는 경우도 허용(그대로 재저장)
      const keepIndices = [];
      for (let p = 1; p <= total; p++) {
        if (!delSet.has(p)) keepIndices.push(p - 1); // 0-based
      }

      if (keepIndices.length === 0) {
        setStatus("모든 페이지를 삭제할 수는 없습니다. (최소 1페이지는 남겨야 합니다)", "error");
        return;
      }

      btnMake.disabled = true;
      btnMake.textContent = "처리 중...";

      try {
        const newDoc = await PDFLib.PDFDocument.create();
        const copied = await newDoc.copyPages(pdfDoc, keepIndices);
        copied.forEach((page) => newDoc.addPage(page));

        const newBytes = await newDoc.save();

        const blob = new Blob([newBytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);
        lastObjectUrl = url;

        const outName = safeOutputName(originalName, `_deleted_${delSet.size}pages`);
        downloadLink.href = url;
        downloadLink.download = outName;
        downloadLink.style.display = "inline-block";

        const msg =
          `완료!\n` +
          `- 원본 페이지: ${total}\n` +
          `- 삭제 페이지: ${delSet.size}\n` +
          `- 결과 페이지: ${keepIndices.length}\n` +
          `\n다운로드 버튼을 눌러 저장하세요.`;
        setStatus(msg, "info");
      } catch (e) {
        setStatus("처리 중 오류가 발생했습니다:\n" + (e?.message || String(e)), "error");
      } finally {
        btnMake.disabled = false;
        btnMake.textContent = "3) 삭제 적용 & 새 PDF 만들기";
      }
    }

    pdfFile.addEventListener("change", async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      if (file.type !== "application/pdf" && !file.name.toLowerCase().endsWith(".pdf")) {
        setStatus("PDF 파일만 선택할 수 있습니다.", "error");
        pdfFile.value = "";
        return;
      }

      try {
        setStatus("PDF 읽는 중...", "info");
        await loadPdf(file);
        setStatus(`PDF 로드 완료! (총 ${totalPages}페이지)`, "info");
      } catch (err) {
        setStatus("PDF 로드 실패:\n" + (err?.message || String(err)), "error");
        resetAll();
      }
    });

    btnMake.addEventListener("click", makeDeletedPdf);
    btnReset.addEventListener("click", resetAll);

    // 초기 상태
    resetAll();
  </script>
</body>
</html>
